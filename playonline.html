<html lang="en"><head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <title>Button Smasher Online Official</title>
  <style>
    :root{
      --bg: #070707;
      --panel: #0f0f10;
      --panel-border: #2a0b0b;
      --accent-red: #b00000;
      --accent-red-dark: #700000;
      --accent-blue: #1e90ff;
      --muted: #9e9e9e;
      --white: #ffffff;
    }

    /* Reset and full-viewport layout */
    html,body{
      height:100%;
      width:100%;
      margin:0;
      padding:0;
      background:var(--bg);
      color:var(--white);
      font-family: Arial, sans-serif;
      -webkit-font-smoothing:antialiased;
      -moz-osx-font-smoothing:grayscale;
      font-weight:400;
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      -ms-user-select: none;
      user-select: none;
      box-sizing:border-box;
    }
    *,*::before,*::after{ box-sizing:inherit; }

    .app {
      height:100vh;
      width:100vw;
      display:flex;
      align-items:stretch;
      justify-content:center;
      overflow:hidden;
    }

    .container {
      height:100%;
      width:100%;
      max-width:1400px;
      display:flex;
      flex-direction:column;
      gap:12px;
      padding:12px;
      box-sizing:border-box;
      align-items:stretch;
      justify-content:flex-start;
    }

    .header{
      display:flex;
      gap:12px;
      align-items:center;
      padding:6px 8px;
      min-height:84px;
    }

    .header img.logo{
      width:64px;
      height:64px;
      object-fit:cover;
      border-radius:10px;
      display:block;
      flex:0 0 64px;
    }

    .title-block{
      display:flex;
      flex-direction:column;
      gap:6px;
      min-width:0;
    }

    .title-block h1{
      margin:0;
      font-size:18px;
      font-weight:400;
      line-height:1;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .title-block p{
      margin:0;
      color:var(--muted);
      font-size:12px;
      max-width:100%;
      line-height:1.2;
    }

    .game-area{
      position:relative;
      flex:1 1 auto;
      min-height:0;
      border-radius:10px;
      overflow:hidden;
      display:flex;
      align-items:center;
      justify-content:center;
      background: linear-gradient(180deg, rgba(255,255,255,0.02), transparent);
      border:1px solid rgba(255,255,255,0.02);
    }

    canvas#gameCanvas{
      position:absolute;
      inset:0;
      width:100%;
      height:100%;
      display:block;
      background: transparent;
    }

    .main-menu{
      position:relative;
      width:clamp(680px, 78%, 1100px);
      max-width:calc(100% - 48px);
      padding:18px;
      display:flex;
      gap:18px;
      align-items:center;
      justify-content:space-between;
      background:var(--panel);
      border-radius:14px;
      border:1px solid var(--panel-border);
      z-index:20;
      box-shadow: 0 6px 30px rgba(0,0,0,0.45);
      transform-origin:center;
      overflow:visible; /* allow internal absolute elements to be visible */
    }

    /* INFO BUTTON: kept inside the main-menu bounds (no negative offsets).
       Positioned relative to the main-menu so it always stays visually inside. */
    .info-inside{
      position:absolute;
      left:12px;   /* inside the island */
      top:12px;    /* inside the island */
      z-index:30;
      width:44px;
      height:44px;
      border-radius:10px;
      background:#141414;
      border:1px solid #222;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      color:var(--muted);
      font-size:16px;
      cursor:pointer;
      box-sizing:border-box;
      font-weight:400;
    }

    .menu-left{
      width:46%;
      display:flex;
      flex-direction:column;
      gap:12px;
      align-items:center;
      justify-content:center;
    }

    .smash-wrap{
      width:clamp(160px, 22vw, 320px);
      height:clamp(160px, 22vw, 320px);
      border-radius:50%;
      overflow:hidden;
      display:flex;
      align-items:center;
      justify-content:center;
      border:6px solid var(--accent-red-dark);
      background:var(--accent-red);
      cursor:pointer;
      flex-shrink:0;
    }

    .smash-wrap img.logo-smash{
      width:100%;
      height:100%;
      object-fit:cover;
      display:block;
      border-radius:50%;
      -webkit-user-drag:none;
      user-select:none;
    }

    .menu-right{
      width:48%;
      display:flex;
      flex-direction:column;
      gap:10px;
      align-items:flex-start;
      justify-content:center;
      position:relative;
      min-width:0;
    }

    .game-title{
      margin:0;
      font-size:clamp(20px, 3.2vw, 36px);
      font-weight:400;
      color:var(--white);
      font-family: Arial, sans-serif;
      line-height:1.05;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .actions{
      display:flex;
      gap:12px;
      margin-top:6px;
      align-items:center;
      flex-wrap:wrap;
    }

    .btn{
      padding:12px 22px;
      border-radius:12px;
      font-weight:400;
      cursor:pointer;
      border:0;
      font-size:clamp(14px,1.6vw,16px);
      font-family: Arial, sans-serif;
      min-width:140px;
      text-align:center;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:8px;
    }

    .btn-play{
      background:var(--accent-blue);
      color:#fff;
      border:2px solid rgba(255,255,255,0.04);
    }

    .btn-more{
      background:#000;
      color:#fff;
      border:2px solid var(--accent-blue);
    }

    @media (max-width:820px){
      .main-menu{
        width:calc(100% - 32px);
        padding:14px;
        flex-direction:column;
        gap:14px;
        align-items:center;
      }
      .menu-left, .menu-right{
        width:100%;
        align-items:center;
        text-align:center;
      }
      .info-inside{
        left:12px;
        top:12px;
      }
      .actions{ justify-content:center; }
    }

    @media (max-width:420px){
      .info-inside{ left:8px; top:8px; width:36px; height:36px; font-size:13px; }
      .main-menu{ padding:12px; gap:10px; }
      .btn{ min-width:120px; padding:10px 14px; }
    }
  </style>
</head>
<body>
  <div class="app" id="appRoot">
    <div class="container" id="container">
      <header class="header" aria-hidden="true">
        <img class="logo" src="applogo.png" alt="App logo">
        <div class="title-block">
          <h1>Button Smasher Online</h1>
          <p>Official website | Note: This version of the game has been specifically optimized for the web. <a href="https://buttonsmasher.masonnet.org">Button Smasher (Main Website)</a> | <a href="https://www.masonnet.org">MASONNET</a></p>
        </div>
      </header>

      <main class="game-area" id="gameArea" role="main" aria-label="Game area">
        <section class="main-menu" id="mainMenu" role="dialog" aria-label="Main menu">
          <!-- Info button is positioned inside the main-menu (always stays within it) -->
          <button class="info-inside" id="infoBtn" aria-label="Info">i</button>

          <div class="menu-left">
            <div class="smash-wrap" id="smashWrap" aria-hidden="true">
              <img class="logo-smash" src="applogo.png" alt="Smash graphic">
            </div>
          </div>

          <div class="menu-right">
            <h2 class="game-title" id="gameTitle">Button Smasher</h2>

            <div class="actions" role="group" aria-label="Main actions">
              <button class="btn btn-play" id="playBtn">Play</button>
              <button class="btn btn-more" id="moreBtn">More Gamemodes</button>
            </div>
          </div>
        </section>
      </main>
    </div>
  </div>

  <script>
    (function(){
      const gameArea = document.getElementById('gameArea');
      const canvas = document.createElement('canvas');
      canvas.id = 'gameCanvas';
      gameArea.insertBefore(canvas, gameArea.firstChild);
      const ctx = canvas.getContext('2d');

      function resizeCanvasToFit(){
        const rect = gameArea.getBoundingClientRect();
        const dpr = Math.max(1, window.devicePixelRatio || 1);
        const w = Math.max(1, Math.round(rect.width * dpr));
        const h = Math.max(1, Math.round(rect.height * dpr));
        if (canvas.width !== w || canvas.height !== h) {
          canvas.width = w;
          canvas.height = h;
          canvas.style.width = rect.width + 'px';
          canvas.style.height = rect.height + 'px';
          ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        }
      }

      const particles = [];
      const PARTICLE_COUNT = 36;
      for(let i=0;i<PARTICLE_COUNT;i++){
        particles.push({
          x: Math.random(),
          y: Math.random(),
          s: 0.6 + Math.random()*1.8,
          v: 0.02 + Math.random()*0.06,
          phase: Math.random()*Math.PI*2
        });
      }

      function drawBackground(){
        const w = canvas.width / (window.devicePixelRatio || 1);
        const h = canvas.height / (window.devicePixelRatio || 1);
        ctx.clearRect(0,0,w,h);
        ctx.fillStyle = '#070707';
        ctx.fillRect(0,0,w,h);

        ctx.fillStyle = 'rgba(255,255,255,0.02)';
        const t = performance.now() / 1000;
        for(let i=0;i<particles.length;i++){
          const p = particles[i];
          p.x += p.v * 0.02 * Math.sin(t * (0.5 + i * 0.03) + p.phase);
          p.y += p.v * 0.02 * Math.cos(t * (0.4 + i * 0.02) + p.phase);
          if(p.x > 1) p.x = 0;
          if(p.x < 0) p.x = 1;
          if(p.y > 1) p.y = 0;
          if(p.y < 0) p.y = 1;
          ctx.beginPath();
          ctx.ellipse(p.x * w, p.y * h, p.s, p.s, 0, 0, Math.PI*2);
          ctx.fill();
        }
      }

      function frame(){
        drawBackground();
        requestAnimationFrame(frame);
      }

      const ro = new ResizeObserver(() => {
        resizeCanvasToFit();
      });
      ro.observe(gameArea);

      window.addEventListener('orientationchange', () => {
        setTimeout(resizeCanvasToFit, 120);
      }, {passive:true});

      resizeCanvasToFit();
      requestAnimationFrame(frame);

      // UI interactions
      const mainMenu = document.getElementById('mainMenu');
      const playBtn = document.getElementById('playBtn');
      const moreBtn = document.getElementById('moreBtn');
      const smashWrap = document.getElementById('smashWrap');
      const infoBtn = document.getElementById('infoBtn');

      function pulse(el){
        if(!el) return;
        el.animate([
          { transform: 'scale(1)' },
          { transform: 'scale(0.96)' },
          { transform: 'scale(1.04)' },
          { transform: 'scale(1)' }
        ], { duration: 360, easing: 'cubic-bezier(.2,.8,.2,1)' });
      }

      playBtn.addEventListener('click', () => {
        pulse(mainMenu);
        setTimeout(()=> mainMenu.style.display = 'none', 300);
        startDemo();
      });

      smashWrap.addEventListener('click', () => {
        pulse(smashWrap);
        const ev = new PointerEvent('pointerdown', { bubbles: true });
        document.getElementById('gameCanvas')?.dispatchEvent(ev);
      });

      infoBtn.addEventListener('click', () => {
        alert('Button Smasher Online — web version info.');
      });

      moreBtn.addEventListener('click', () => {
        alert('More gamemodes coming soon.');
      });

      function startDemo(){
        const canvas = document.getElementById('gameCanvas');
        if(!canvas) return;
        const ctx = canvas.getContext('2d');
        let score = 0;
        function drawHUD(){
          const w = canvas.width / (window.devicePixelRatio || 1);
          ctx.clearRect(0,0,w,64);
          ctx.fillStyle = '#fff';
          ctx.font = '18px Arial';
          ctx.fillText('Score: ' + score, 18, 28);
        }
        drawHUD();
        function onPointer(){ score++; drawHUD(); ctx.fillStyle='rgba(255,255,255,0.04)'; ctx.fillRect(0,0,canvas.width/(window.devicePixelRatio||1),canvas.height/(window.devicePixelRatio||1)); }
        canvas.addEventListener('pointerdown', onPointer);
        setTimeout(()=>{ canvas.removeEventListener('pointerdown', onPointer); mainMenu.style.display = ''; }, 60000);
      }

      // Ensure info button remains visually inside the main-menu when the menu is scaled or moved.
      // If the main-menu becomes too small, clamp the info button position so it doesn't overflow.
      const clampInfoPosition = () => {
        const menuRect = mainMenu.getBoundingClientRect();
        const info = infoBtn;
        const padding = 8; // keep a small inset
        // compute allowed left/top relative to menu
        const left = Math.max(padding, Math.min(12, menuRect.width - info.offsetWidth - padding));
        const top = Math.max(padding, Math.min(12, menuRect.height - info.offsetHeight - padding));
        info.style.left = left + 'px';
        info.style.top = top + 'px';
      };

      // run on resize and when layout changes
      const menuObserver = new ResizeObserver(clampInfoPosition);
      menuObserver.observe(mainMenu);
      window.addEventListener('resize', clampInfoPosition, {passive:true});
      // initial clamp
      clampInfoPosition();
    })();
  </script>


</body></html>
